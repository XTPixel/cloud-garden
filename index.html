<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>云外庭院 · Personal Garden</title>
  <script src="src/js/theme-init.js"></script>
  <link rel="stylesheet" href="src/css/base.css" />
  <link rel="stylesheet" href="src/css/widgets.css" />
</head>
<body>
  <div class="sky-layer stars" aria-hidden="true"></div>
  <div class="sky-layer aurora aurora-one" aria-hidden="true"></div>
  <div class="sky-layer aurora aurora-two" aria-hidden="true"></div>
  <div class="sky-layer cloud cloud-one" aria-hidden="true"></div>
  <div class="sky-layer cloud cloud-two" aria-hidden="true"></div>
  <div class="sky-layer garden-silhouette garden-left" aria-hidden="true"></div>
  <div class="sky-layer garden-silhouette garden-right" aria-hidden="true"></div>
  <div class="sky-layer vine-trail" aria-hidden="true"></div>
  <button class="theme-toggle" id="themeToggle" type="button" aria-label="&#20999;&#25442;&#20027;&#39064;" aria-pressed="false"><span>&#9790;</span><b>&#22812;&#38388;</b></button>

  <main class="desktop" id="desktop" aria-label="可拖动的云外庭院桌面">
    <section class="widget profile-widget island-card" data-widget="profile" style="--x: 8%; --y: 13%; --w: 292px; --h: 446px;">
      <div class="drag-handle" aria-label="拖动旅人档案模块"></div>
      <div class="profile-head">
        <img class="avatar profile-avatar" src="src/assets/avatar.jpg" alt="XTPixel 的头像" />
        <div>
          <h1>XTPixel</h1>
          <p>Lv.999.</p>
        </div>
      </div>
      <nav class="side-nav" aria-label="庭院导航">
        <a class="active" href="#">⌂ <span>首页</span></a>
        <a href="projects.html">⚒ <span>开发项目</span></a>
        <a href="articles.html">✎ <span>近期文章</span></a>
        <a href="photos.html">▧ <span>照片墙</span></a>
        <a href="favorites.html">◎ <span>网站收藏</span></a>
      </nav>
    </section>

    <section class="widget portal-widget" data-widget="portal" style="--x: 36%; --y: 7%; --w: 390px; --h: 220px;">
      <div class="drag-handle" aria-label="拖动世界窗口模块"></div>
      <div class="portal-scene" aria-hidden="true">
        <div class="sun"></div>
        <div class="floating-island island-a"></div>
        <div class="floating-island island-b"></div>
        <div class="floating-island island-c"></div>
        <div class="mini-tower"></div>
      </div>
      <p class="portal-caption">Cloud Atlas · 一个世界之外的小庭院</p>
    </section>

    <section class="widget greeting-widget island-card" data-widget="greeting" style="--x: 37%; --y: 34%; --w: 370px; --h: 292px;">
      <div class="drag-handle" aria-label="拖动问候模块"></div>
      <div class="spirit" id="spirit" aria-hidden="true">
        <span class="spirit-face">•ᴗ•</span>
      </div>
      <span class="kicker">TODAY'S SPAWN POINT</span>
      <h2 id="greeting">Good Morning</h2>
      <p>欢迎回到 <strong>云外庭院</strong><br />今天也慢慢发光。</p>
    </section>

    <section class="widget clock-widget rune-card" data-widget="clock" style="--x: 68%; --y: 20%; --w: 336px; --h: 248px;">
      <div class="drag-handle" aria-label="拖动时间模块"></div>
      <div class="clock-head">
        <span class="kicker">TIME CRYSTAL</span>
        <span class="clock-mode-label" id="clockModeLabel">实时</span>
      </div>
      <div class="digital-time" id="time">--:--:--</div>
      <div class="clock-tabs" role="tablist" aria-label="时钟模式">
        <button class="active" type="button" role="tab" aria-selected="true" data-clock-mode="clock">时钟</button>
        <button type="button" role="tab" aria-selected="false" data-clock-mode="pomodoro">番茄</button>
        <button type="button" role="tab" aria-selected="false" data-clock-mode="stopwatch">正计时</button>
        <button type="button" role="tab" aria-selected="false" data-clock-mode="countdown">倒计时</button>
      </div>
      <div class="timer-setup" id="timerSetup" hidden>
        <label>
          <span>分钟</span>
          <input id="timerMinutes" type="number" min="1" max="999" value="25" inputmode="numeric" />
        </label>
      </div>
      <div class="clock-actions">
        <button id="timerStart" type="button">开始</button>
        <button id="timerPause" type="button">暂停</button>
        <button id="timerReset" type="button">重置</button>
      </div>
    </section>

    <section class="widget calendar-widget island-card" data-widget="calendar" style="--x: 66%; --y: 40%; --w: 360px; --h: 300px;">
      <div class="drag-handle" aria-label="拖动星历模块"></div>
      <div class="calendar-head">
        <div>
          <span class="kicker">MOON CALENDAR</span>
          <p class="calendar-title" id="date">2026/7/1 周三</p>
        </div>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
      <div class="year-mini">
        <span>本年航行</span>
        <strong id="yearPercent">0%</strong>
        <i><b id="yearBar"></b></i>
      </div>
    </section>

    <section class="widget links-widget" data-widget="links" style="--x: 34%; --y: 67%; --w: 485px; --h: 78px;">
      <div class="drag-handle" aria-label="拖动传送门模块"></div>
      <div class="quick-links" id="bookmarkGrid"></div>
    </section>


    <section class="widget quote-widget parchment-card" data-widget="quote" style="--x: 35%; --y: 78%; --w: 315px; --h: 164px;" id="quoteCard" tabindex="0" role="button" aria-label="点击切换一句箴言">
      <div class="drag-handle" aria-label="拖动箴言模块"></div>
      <span class="kicker">FORTUNE SCROLL</span>
      <blockquote id="quoteText">慢慢来，比较快。</blockquote>
      <small id="quoteSource">个人语录</small>
    </section>

    <section class="widget music-widget rune-card" data-widget="music" style="--x: 57%; --y: 78%; --w: 304px; --h: 72px;">
      <div class="drag-handle" aria-label="拖动音乐模块"></div>
      <span class="music-note">♬</span>
      <div class="song-info">
        <strong id="songTitle">晚安喵</strong>
        <small id="songArtist">《罗小黑战记》主题曲 · 艾索</small>
        <i><b id="musicProgress"></b></i>
      </div>
      <audio id="musicAudio" preload="metadata" src="src/assets/music/wan-an-miao.mp3"></audio>
      <button id="musicToggle" type="button" aria-label="播放晚安喵">▶</button>
    </section>

    <section class="widget weather-widget island-card" data-widget="weather" style="--x: 74%; --y: 74%; --w: 210px; --h: 154px;">
      <div class="drag-handle" aria-label="拖动天气模块"></div>
      <div class="weather-head">
        <span class="kicker">LOCAL WEATHER</span>
        <button id="refreshWeather" type="button" aria-label="刷新当前位置天气">↻</button>
      </div>
      <div class="weather-main">
        <div class="weather-orb" id="weatherIcon">◌</div>
        <div>
          <strong id="weatherTemp">--°</strong>
          <p id="weatherText">点击刷新获取天气</p>
        </div>
      </div>
      <small id="weatherPlace">等待定位</small>
    </section>

    <button class="notes-fab" id="notesToggle" type="button" data-widget="notesButton" style="--x: 59%; --y: 88%; --w: 58px; --h: 58px;" aria-label="打开便签">✦</button>

    <div class="note-wall" id="noteWall" aria-label="桌面便利贴"></div>

    <div class="hud">
      <span>拖动模块可重新布置庭院</span>
    </div>
    <button class="reset-layout" id="resetLayout" type="button"><span>&#8634;</span><b>&#37325;&#32622;&#24067;&#23616;</b></button>
  </main>
  <script type="module" src="src/js/pages/home.js"></script>
</body>
</html>
