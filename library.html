<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>藏书阁 · 云外庭院</title>
  <script>
    (() => {
      const key = 'dashboard.theme', root = document.documentElement;
      try { if (localStorage.getItem(key) === 'night') root.dataset.theme = 'night'; }
      catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="src/css/base.css" />
  <link rel="stylesheet" href="src/css/pages.css" />
  <link rel="stylesheet" href="src/css/library.css" />
</head>
<body class="projects-page library-page">
  <div class="sky-layer stars" aria-hidden="true"></div>
  <div class="sky-layer aurora aurora-one" aria-hidden="true"></div>
  <div class="sky-layer aurora aurora-two" aria-hidden="true"></div>
  <div class="sky-layer cloud cloud-one" aria-hidden="true"></div>
  <div class="sky-layer cloud cloud-two" aria-hidden="true"></div>
  <div class="sky-layer garden-silhouette garden-left" aria-hidden="true"></div>
  <div class="sky-layer garden-silhouette garden-right" aria-hidden="true"></div>
  <div class="sky-layer vine-trail" aria-hidden="true"></div>
  <div class="sky-layer theme-decor" aria-hidden="true"></div>

  <main class="projects-page-shell library-page-shell" aria-label="藏书阁页面">
    <aside class="projects-side floating-nav island-card">
      <div class="profile-head">
        <img class="avatar profile-avatar" src="src/assets/avatar.jpg" alt="XTPixel avatar" />
      </div>
      <nav class="side-nav" aria-label="庭院导航">
        <a href="index.html"><span class="nav-icon" aria-hidden="true">⌂</span><span class="nav-label">首页</span></a>
        <a href="projects.html"><span class="nav-icon" aria-hidden="true">⚒</span><span class="nav-label">开发项目</span></a>
        <a href="articles.html"><span class="nav-icon" aria-hidden="true">✎</span><span class="nav-label">近期文章</span></a>
        <a class="active" href="library.html"><span class="nav-icon" aria-hidden="true">📖</span><span class="nav-label">藏书阁</span></a>
        <a href="favorites.html"><span class="nav-icon" aria-hidden="true">◎</span><span class="nav-label">网站收藏</span></a>
      </nav>
    </aside>

    <section class="projects-hero library-hero island-card">
      <span class="kicker">THE STUDY</span>
      <div class="projects-hero-head">
        <div>
          <h2>藏书阁</h2>
          <p>庭院深处的书房，记录翻过的每一页世界。</p>
        </div>
      </div>
    </section>

    <section class="projects-board library-board island-card" aria-labelledby="libraryTitle">
      <div class="projects-board-head library-board-head">
        <div>
          <span class="kicker">BOOKSHELF</span>
          <h2 id="libraryTitle">📖 书架</h2>
        </div>
      </div>

      <div class="library-tabs" id="libraryTabs" role="tablist" aria-label="藏书分类">
        <button class="active" type="button" role="tab" aria-selected="true" data-filter="all">全部</button>
        <button type="button" role="tab" aria-selected="false" data-filter="anime">📺 番剧</button>
        <button type="button" role="tab" aria-selected="false" data-filter="donghua">🏮 国创</button>
        <button type="button" role="tab" aria-selected="false" data-filter="tv">🖥️ 电视剧</button>
        <button type="button" role="tab" aria-selected="false" data-filter="documentary">🎞️ 纪录片</button>
        <button type="button" role="tab" aria-selected="false" data-filter="movie">🎬 电影</button>
        <button type="button" role="tab" aria-selected="false" data-filter="book">📖 书籍</button>
        <button type="button" role="tab" aria-selected="false" data-filter="game">🎮 游戏</button>
      </div>

      <div class="library-shelf-area" id="libraryShelfArea" aria-live="polite">
        <p class="projects-status">正在翻阅藏书架……</p>
      </div>
    </section>
  </main>

  <div class="detail-overlay" id="detailOverlay" role="dialog" aria-label="书籍详情" aria-hidden="true" hidden>
    <div class="detail-card" id="detailCard"></div>
  </div>

  <script type="module" src="src/js/pages/library.js"></script>
</body>
</html>
