<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>云外庭院 · 黑猫精灵图</title>
<style>
  /* ========================================
     全局样式 — 与云外庭院主题风格统一
     ======================================== */
  :root {
    --ink: #2f5251;
    --cream: #fff9df;
    --glass: rgba(248, 255, 244, 0.78);
    --shadow: 0 30px 76px rgba(78, 123, 104, 0.18);
    --inner: inset 0 1px 0 rgba(255,255,255,0.92), inset 0 -18px 36px rgba(255,255,255,0.15);
    --blue: #78d7d1;
    --leaf: #9fe3ac;
    --lilac: #c9c1ff;
    --sun: #FFD700;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Trebuchet MS", "HarmonyOS Sans SC", "Microsoft YaHei", system-ui, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 52% 34%, rgba(255,255,255,0.96), transparent 15rem),
      radial-gradient(circle at 18% 84%, rgba(157,227,172,0.86), transparent 34rem),
      radial-gradient(circle at 78% 18%, rgba(201,193,255,0.35), transparent 28rem),
      linear-gradient(180deg, #edf8fb 0%, #eef8f1 44%, #dcf4df 100%);
    min-height: 100vh;
    padding: 24px;
  }

  .app {
    max-width: 1200px;
    margin: 0 auto;
  }

  h1 {
    font-size: 1.8rem;
    font-weight: 900;
    color: #315256;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }

  .subtitle {
    color: #78978f;
    font-weight: 800;
    font-size: 0.85rem;
    margin-bottom: 24px;
  }
  .subtitle small { opacity: 0.7; }

  /* ---- 控制面板 ---- */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    padding: 18px 22px;
    margin-bottom: 24px;
    border: 1px solid rgba(255,255,255,0.86);
    border-radius: 34px 42px 38px 46px;
    background: var(--glass);
    box-shadow: var(--shadow), var(--inner);
    backdrop-filter: blur(26px);
  }

  .controls label {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #5f7c82;
    font-weight: 900;
    font-size: 0.82rem;
  }

  .controls button, .controls select {
    min-height: 36px;
    padding: 0 16px;
    border: 1px solid rgba(255,255,255,0.82);
    border-radius: 999px;
    color: #42646a;
    background: rgba(255,255,255,0.6);
    box-shadow: var(--inner);
    cursor: pointer;
    font-weight: 900;
    font-size: 0.78rem;
    transition: transform 0.18s, background 0.18s;
  }

  .controls button:hover, .controls select:hover {
    transform: translateY(-2px);
    background: rgba(255,255,255,0.86);
  }

  .controls button.active {
    color: #fff;
    background: linear-gradient(135deg, #73d7c5, #96dc91 48%, #b8b0ff);
  }

  .controls input[type="range"] {
    width: 80px;
    accent-color: #73d7c5;
  }

  .controls .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 999px;
    background: rgba(115,215,197,0.18);
    color: #42646a;
    font-size: 0.72rem;
    font-weight: 900;
  }

  /* ---- 精灵图预览 ---- */
  .spritesheet-card {
    padding: 28px;
    margin-bottom: 24px;
    border: 1px solid rgba(255,255,255,0.86);
    border-radius: 34px 42px 38px 46px;
    background: rgba(255,255,255,0.42);
    box-shadow: var(--shadow), var(--inner);
    backdrop-filter: blur(26px);
  }

  .spritesheet-wrap {
    overflow: auto;
    -webkit-overflow-scrolling: touch;
  }

  #spritesheetCanvas {
    display: block;
    margin: 0 auto;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border-radius: 20px;
    background: repeating-conic-gradient(#f0f0f0 0% 25%, #e4e4e4 0% 50%) 0 0 / 20px 20px;
    min-width: 320px;
  }

  /* ---- 动画预览 ---- */
  .preview-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  .preview-card {
    padding: 22px;
    border: 1px solid rgba(255,255,255,0.86);
    border-radius: 28px 36px 32px 40px;
    background: var(--glass);
    box-shadow: var(--shadow), var(--inner);
    backdrop-filter: blur(26px);
  }

  .preview-card h3 {
    font-size: 0.85rem;
    color: #5f7c82;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .preview-card h3 .tag {
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(115,215,197,0.24);
    color: #42646a;
  }

  .preview-canvas-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 140px;
    background:
      radial-gradient(circle at 50% 50%, rgba(255,255,255,0.42), transparent 60%),
      linear-gradient(180deg, #f8fffa, #eef8f1);
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.6);
  }

  .preview-canvas-wrap canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  /* ---- 信息面板 ---- */
  .info-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .info-card {
    padding: 16px 18px;
    border: 1px solid rgba(255,255,255,0.78);
    border-radius: 20px 26px 22px 28px;
    background: rgba(255,255,255,0.34);
    box-shadow: var(--inner);
  }

  .info-card h4 {
    font-size: 0.68rem;
    color: #78978f;
    letter-spacing: 0.12em;
    margin-bottom: 6px;
  }

  .info-card p {
    font-size: 0.82rem;
    font-weight: 800;
    color: #315256;
    line-height: 1.6;
  }

  .info-card .emoji-list {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
  }

  .info-card .emoji-list span {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(255,255,255,0.5);
    font-size: 0.72rem;
    font-weight: 900;
  }

  /* ---- 夜间模式 ---- */
  html[data-theme="night"] {
    --ink: #e8fbf7;
    --cream: #263b4b;
    --glass: rgba(24, 47, 62, 0.66);
    --shadow: 0 30px 86px rgba(2, 11, 22, 0.42);
    --inner: inset 0 1px 0 rgba(255,255,255,0.16), inset 0 -18px 36px rgba(6,18,32,0.18);
  }

  html[data-theme="night"] body {
    color: var(--ink);
    background:
      radial-gradient(circle at 52% 34%, rgba(77,120,147,0.32), transparent 15rem),
      radial-gradient(circle at 18% 84%, rgba(81,180,137,0.24), transparent 34rem),
      radial-gradient(circle at 78% 18%, rgba(139,133,255,0.28), transparent 28rem),
      linear-gradient(180deg, #071623 0%, #102637 48%, #173b38 100%);
  }

  html[data-theme="night"] .controls,
  html[data-theme="night"] .spritesheet-card,
  html[data-theme="night"] .preview-card,
  html[data-theme="night"] .info-card {
    border-color: rgba(188, 240, 231, 0.24);
    color: var(--ink);
    background:
      radial-gradient(circle at 14% 10%, rgba(119,228,216,0.14), transparent 7rem),
      linear-gradient(145deg, rgba(28,54,70,0.82), rgba(18,38,53,0.66));
    box-shadow: var(--shadow), var(--inner);
  }

  html[data-theme="night"] .controls button,
  html[data-theme="night"] .controls select {
    border-color: rgba(188,240,231,0.24);
    color: #d7f7f1;
    background: rgba(255,255,255,0.09);
  }

  html[data-theme="night"] h1 { color: #f2fffb; }
  html[data-theme="night"] .subtitle { color: #a8c6c8; }
  html[data-theme="night"] .info-card h4 { color: #a8c6c8; }
  html[data-theme="night"] .info-card p { color: #e8fbf7; }
  html[data-theme="night"] .preview-card h3 { color: #b8d7d9; }
  html[data-theme="night"] .preview-canvas-wrap {
    background: rgba(7,22,35,0.3);
  }
  html[data-theme="night"] .controls .badge {
    background: rgba(119,228,216,0.2);
    color: #d7f7f1;
  }
</style>
</head>
<body>
<div class="app">
  <h1>☾ 庭中黑猫 · 精灵图</h1>
  <p class="subtitle">
    云外庭院电子宠物 · 罗小黑风格 2D 精灵序列帧
    <small>— 每行一组动画，共 7 组 28 帧</small>
  </p>

  <!-- 控制面板 -->
  <div class="controls">
    <label>
      <span>▶ 预览动画</span>
      <button id="animBtn" class="active">播放</button>
    </label>
    <label>
      <span>速度</span>
      <input type="range" id="speedRange" min="2" max="20" value="8" />
      <span id="speedLabel">8 fps</span>
    </label>
    <label>
      <span>行</span>
      <select id="rowSelect">
        <option value="0">闲逛 Idle</option>
        <option value="1">走路 Walk</option>
        <option value="2">睡觉 Sleep</option>
        <option value="3">开心 Happy</option>
        <option value="4">好奇 Curious</option>
        <option value="5">受惊 Startle</option>
        <option value="6">日常 Daily</option>
      </select>
    </label>
    <button id="exportBtn">⬇ 导出 PNG</button>
    <button id="themeBtn">☾ 夜间</button>
    <span class="badge">帧: <b id="frameInfo">1/4</b></span>
    <span class="badge">总计: 28 帧</span>
  </div>

  <!-- 完整精灵图 -->
  <div class="spritesheet-card">
    <div class="spritesheet-wrap">
      <canvas id="spritesheetCanvas"></canvas>
    </div>
  </div>

  <!-- 动画预览 + 单个放大 -->
  <div class="preview-grid">
    <div class="preview-card">
      <h3>🔍 动画预览 <span class="tag" id="rowNameTag">闲逛 Idle</span></h3>
      <div class="preview-canvas-wrap">
        <canvas id="animPreviewCanvas"></canvas>
      </div>
    </div>
    <div class="preview-card">
      <h3>🎯 当前帧 <span class="tag" id="frameNameTag">帧 1/4</span></h3>
      <div class="preview-canvas-wrap">
        <canvas id="singlePreviewCanvas"></canvas>
      </div>
    </div>
  </div>

  <!-- 精灵图信息 -->
  <div class="info-grid">
    <div class="info-card">
      <h4>📐 规格</h4>
      <p>
        单帧 80×80 px<br>
        每行 4 帧 · 共 7 行<br>
        整图 320×560 px
      </p>
    </div>
    <div class="info-card">
      <h4>🎬 动画清单</h4>
      <div class="emoji-list">
        <span>🚶 闲逛</span>
        <span>🏃 走路</span>
        <span>💤 睡觉</span>
        <span>😊 开心</span>
        <span>🔍 好奇</span>
        <span>😱 受惊</span>
        <span>😺 日常</span>
      </div>
    </div>
    <div class="info-card">
      <h4>🎨 配色（罗小黑官方设定）</h4>
      <p>
        毛色 #111111 · 黄金瞳 #FFC800<br>
        绿耳 #7ECF8A · 蓝舌 #6BB5D9<br>
        黑鼻头 · 纯黑无描边 · 极简风格<br>
        夜间：蓝黑毛 + 虹膜发光
      </p>
    </div>
  </div>
</div>

<script>
// ============================================================
//  黑猫精灵图生成器
//  罗小黑风格 · 2D帧动画 · 7组×4帧
// ============================================================

const SPRITE_W = 80;   // 单帧宽度
const SPRITE_H = 80;   // 单帧高度
const COLS = 4;        // 每行帧数
const ROWS = 7;        // 行数（=动画组数）
const SHEET_W = SPRITE_W * COLS;
const SHEET_H = SPRITE_H * ROWS;

const ROW_NAMES = [
  '闲逛 Idle',
  '走路 Walk',
  '睡觉 Sleep',
  '开心 Happy',
  '好奇 Curious',
  '受惊 Startle',
  '日常 Daily',
];

// ---- Canvas 引用 ----
const sheetCanvas = document.getElementById('spritesheetCanvas');
const sheetCtx = sheetCanvas.getContext('2d');
sheetCanvas.width = SHEET_W;
sheetCanvas.height = SHEET_H;

const animCanvas = document.getElementById('animPreviewCanvas');
const animCtx = animCanvas.getContext('2d');
animCanvas.width = SPRITE_W * 3;
animCanvas.height = SPRITE_H * 3;

const singleCanvas = document.getElementById('singlePreviewCanvas');
const singleCtx = singleCanvas.getContext('2d');
singleCanvas.width = SPRITE_W * 3;
singleCanvas.height = SPRITE_H * 3;

// ---- 动画状态 ----
let currentRow = 0;
let currentFrame = 0;
let isPlaying = true;
let fps = 8;
let animTimer = null;
let isNight = false;

// ============================================================
//  绘制核心 — 小黑猫
//  所有坐标以 80×80 帧为基准
// ============================================================

/** 绘制小黑猫的通用函数 */
function drawCat(ctx, pose, frame, night) {
  const w = SPRITE_W, h = SPRITE_H;
  ctx.clearRect(0, 0, w, h);

  // ---- 调色板（罗小黑官方设定） — 黑身·绿耳·金瞳·蓝舌 ----
  const palette = {
    fur: night ? '#0d0d1a' : '#111111',
    furLight: night ? '#1a1a2e' : '#1a1a1a',
    eye: '#FFC800',
    eyeGlow: night ? 'rgba(255,200,0,0.6)' : 'rgba(255,200,0,0.3)',
    pupil: '#000',
    nose: '#222',
    mouth: night ? '#666' : '#444',
    earInner: night ? '#5B8C5A' : '#7ECF8A',
    tongue: night ? '#4A7A9E' : '#6BB5D9',
    whisker: night ? 'rgba(147,197,253,0.35)' : 'rgba(200,200,200,0.5)',
    zzz: night ? '#a78bfa' : '#7ECF8A',
    heart: '#ff6b8a',
    pawPad: night ? '#2a2a3e' : '#333',
  };

  // ---- 根据 pose 和 frame 计算动画参数 ----
  const params = getPoseParams(pose, frame, night);

  // ---- 1. 尾巴（先画在身体后面） ----
  drawTail(ctx, params.tail, palette);

  // ---- 2. 后腿 / 身体底部 ----
  drawBody(ctx, params.body, palette);

  // ---- 3. 前腿 / 爪子 ----
  drawPaws(ctx, params.paws, palette);

  // ---- 4. 头 ----
  drawHead(ctx, params.head, palette);

  // ---- 5. 耳朵 ----
  drawEars(ctx, params.ears, palette);

  // ---- 6. 眼睛 ----
  drawEyes(ctx, params.eyes, palette);

  // ---- 7. 鼻子 ----
  drawNose(ctx, params.nose, palette);

  // ---- 8. 嘴巴 ----
  drawMouth(ctx, params.mouth, palette);

  // ---- 9. 胡须 ----
  drawWhiskers(ctx, params.whiskers, palette);

  // ---- 10. 特效 ----
  drawEffects(ctx, params.effects, palette);

  // ---- 11. 阴影 ----
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  ctx.beginPath();
  ctx.ellipse(40, 76, 28, 6, 0, 0, Math.PI * 2);
  ctx.fill();
}

// ============================================================
//  各部位绘制函数
// ============================================================

function drawTail(ctx, p, pal) {
  // p = { x, y, curve, angle, sway }
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.angle || 0);

  ctx.strokeStyle = pal.fur;
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();

  const curve = p.curve || 0.4;
  if (p.style === 'wrap') {
    // 环绕身体
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(12, -4, 20, 8);
    ctx.quadraticCurveTo(24, 18, 16, 24);
    ctx.stroke();
    // 尾巴尖
    ctx.fillStyle = pal.fur;
    ctx.beginPath();
    ctx.arc(16, 24, 3.5, 0, Math.PI * 2);
    ctx.fill();
  } else if (p.style === 'curl') {
    // 卷曲
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(10, -8, 24, -6, 28, 6);
    ctx.bezierCurveTo(30, 12, 26, 18, 20, 20);
    ctx.stroke();
    ctx.fillStyle = pal.fur;
    ctx.beginPath();
    ctx.arc(20, 20, 3, 0, Math.PI * 2);
    ctx.fill();
  } else if (p.style === 'up') {
    // 竖起
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(10, -p.sway * 4 - 4, 16, -22 - p.sway * 2);
    ctx.stroke();
    ctx.fillStyle = pal.fur;
    ctx.beginPath();
    ctx.arc(16, -22 - p.sway * 2, 2.5, 0, Math.PI * 2);
    ctx.fill();
  } else if (p.style === 'drag') {
    // 拖地（走路）
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(-6, 2, -10 + p.sway * 2, 14 + p.sway);
    ctx.stroke();
  } else if (p.style === 'circle') {
    // 睡觉时圈住身体
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(-14, -4, -20, 8);
    ctx.quadraticCurveTo(-22, 18, -14, 24);
    ctx.stroke();
    ctx.fillStyle = pal.fur;
    ctx.beginPath();
    ctx.arc(-14, 24, 3, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // 默认下垂
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(6, 8, 10 + p.sway, 18 + Math.abs(p.sway) * 0.5);
    ctx.stroke();
  }

  ctx.restore();
}

function drawBody(ctx, p, pal) {
  // 主体 — 椭圆或圆形
  ctx.fillStyle = pal.fur;
  ctx.beginPath();

  const b = p || {};
  const cx = b.x || 40;
  const cy = b.y || 54;
  const rx = b.rx || 20;
  const ry = b.ry || 18;

  if (b.style === 'sleep') {
    // 睡觉时蜷缩成团
    ctx.ellipse(cx, cy + 4, 26, 22, 0, 0, Math.PI * 2);
  } else if (b.style === 'stretch') {
    // 伸懒腰
    ctx.ellipse(cx, cy, rx, ry + 6, 0, 0, Math.PI * 2);
  } else if (b.style === 'walk') {
    // 走路时身体稍倾斜
    ctx.ellipse(cx + (b.tilt || 0), cy, rx, ry, 0.08, 0, Math.PI * 2);
  } else {
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
  }
  ctx.fill();
}

function drawPaws(ctx, p, pal) {
  if (!p) return;
  ctx.fillStyle = pal.fur;

  p.forEach(leg => {
    ctx.beginPath();
    ctx.ellipse(leg.x, leg.y, leg.rx || 6, leg.ry || 5, 0, 0, Math.PI * 2);
    ctx.fill();
    // 爪爪小肉垫
    if (leg.showPad) {
      ctx.fillStyle = pal.pawPad;
      ctx.beginPath();
      ctx.ellipse(leg.x + leg.padDx, leg.y + leg.padDy, 2.5, 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = pal.fur;
    }
  });
}

function drawHead(ctx, p, pal) {
  const cx = p.x || 40;
  const cy = p.y || 32;
  const r = p.r || 18;

  ctx.fillStyle = pal.fur;

  if (p.style === 'tiltLeft') {
    ctx.beginPath();
    ctx.ellipse(cx - 2, cy + 1, r, r * 1.05, -0.1, 0, Math.PI * 2);
    ctx.fill();
  } else if (p.style === 'tiltRight') {
    ctx.beginPath();
    ctx.ellipse(cx + 2, cy + 1, r, r * 1.05, 0.1, 0, Math.PI * 2);
    ctx.fill();
  } else if (p.style === 'lookUp') {
    ctx.beginPath();
    ctx.ellipse(cx, cy - 1, r, r * 1.06, 0, 0, Math.PI * 2);
    ctx.fill();
  } else if (p.style === 'sleep') {
    // 睡觉时头埋着
    ctx.beginPath();
    ctx.ellipse(cx, cy + 4, r * 0.92, r * 0.85, 0, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.beginPath();
    ctx.ellipse(cx, cy, r, r * 1.04, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // 头顶高光
  if (!p.style || p.style !== 'sleep') {
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.beginPath();
    ctx.ellipse(cx - 5, cy - 10, 6, 4, -0.2, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawEars(ctx, p, pal) {
  if (!p) return;

  // 左耳
  ctx.fillStyle = pal.fur;
  ctx.beginPath();
  ctx.moveTo(p.left.x, p.left.y);
  ctx.lineTo(p.left.tipX, p.left.tipY);
  ctx.lineTo(p.left.x2, p.left.y2);
  ctx.closePath();
  ctx.fill();

  // 左耳内
  ctx.fillStyle = pal.earInner;
  ctx.beginPath();
  ctx.moveTo(p.left.ix, p.left.iy);
  ctx.lineTo(p.left.tipX + 1, p.left.tipY + 3);
  ctx.lineTo(p.left.ix2, p.left.iy2);
  ctx.closePath();
  ctx.fill();

  // 右耳
  ctx.fillStyle = pal.fur;
  ctx.beginPath();
  ctx.moveTo(p.right.x, p.right.y);
  ctx.lineTo(p.right.tipX, p.right.tipY);
  ctx.lineTo(p.right.x2, p.right.y2);
  ctx.closePath();
  ctx.fill();

  // 右耳内
  ctx.fillStyle = pal.earInner;
  ctx.beginPath();
  ctx.moveTo(p.right.ix, p.right.iy);
  ctx.lineTo(p.right.tipX - 1, p.right.tipY + 3);
  ctx.lineTo(p.right.ix2, p.right.iy2);
  ctx.closePath();
  ctx.fill();
}

function drawEyes(ctx, p, pal) {
  if (!p) return;

  // 罗小黑标志性大眼 — 占脸约2/3，放大倍率
  const eyeScale = 1.25;

  // 眼睛辉光（夜间增强）
  if (pal.eyeGlow) {
    ctx.shadowColor = pal.eyeGlow;
    ctx.shadowBlur = p.glowBlur || (p.night ? 16 : 5);
  }

  p.forEach(eye => {
    // 罗小黑标志性大眼放大倍率（闭眼/睡觉不放大）
    const scale = (eye.style === 'sleep' || eye.style === 'closed' || eye.style === 'happy') ? 1 : eyeScale;
    const rx = eye.rx * scale;
    const ry = eye.ry * scale;
    const ex = eye.x;
    const ey = eye.y;

    // 眼白背景
    ctx.fillStyle = pal.eye;
    ctx.beginPath();
    ctx.ellipse(ex, ey, rx, ry, 0, 0, Math.PI * 2);
    ctx.fill();

    // 瞳孔
    ctx.shadowBlur = 0;
    ctx.fillStyle = pal.pupil;
    ctx.beginPath();

    if (eye.style === 'happy') {
      // 开心半眯 → 向下弧形
      ctx.ellipse(ex, ey - 1, rx * 0.7, ry * 0.35, 0, 0, Math.PI);
      ctx.fill();
    } else if (eye.style === 'closed') {
      // 闭眼 → 向下弧线
      ctx.strokeStyle = pal.fur;
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.arc(ex, ey + 2, rx * 0.65, 0, Math.PI);
      ctx.stroke();
    } else if (eye.style === 'sleep') {
      // 睡着 → 细横线
      ctx.strokeStyle = pal.fur;
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.arc(ex, ey + 3, rx * 0.6, 0, Math.PI);
      ctx.stroke();
    } else if (eye.style === 'surprised') {
      // 受惊 → 瞳孔缩小，眼睛瞪圆
      ctx.fill();
      ctx.fillStyle = pal.pupil;
      ctx.beginPath();
      ctx.arc(ex, ey, rx * 0.3, 0, Math.PI * 2);
      ctx.fill();
    } else if (eye.style === 'lookBack') {
      ctx.fill();
      ctx.fillStyle = pal.pupil;
      ctx.beginPath();
      ctx.ellipse(ex + (eye.lookDir || 2), ey, rx * 0.4, ry * 0.7, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // 正常睁眼 — 黄金瞳
      ctx.fill();
      // 竖直瞳孔（猫科）
      ctx.fillStyle = pal.pupil;
      ctx.beginPath();
      ctx.ellipse(ex, ey, rx * 0.3, ry * (p.night ? 0.8 : 0.7), 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // 高光（闭眼/睡觉不画）
    if (eye.style !== 'closed' && eye.style !== 'sleep' && eye.style !== 'happy') {
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath();
      ctx.arc(ex - rx * 0.25, ey - ry * 0.3, rx * 0.22, 0, Math.PI * 2);
      ctx.fill();
      // 小高光
      ctx.beginPath();
      ctx.arc(ex - rx * 0.1, ey - ry * 0.15, rx * 0.1, 0, Math.PI * 2);
      ctx.fill();
    }
  });

  ctx.shadowBlur = 0;
  ctx.shadowColor = 'transparent';
}

function drawNose(ctx, p, pal) {
  if (!p) return;
  ctx.fillStyle = pal.nose;
  ctx.beginPath();

  if (p.style === 'sniff') {
    // 嗅嗅 → 鼻子稍微突出
    ctx.ellipse(p.x, p.y, p.rx + 1, p.ry + 0.5, 0, 0, Math.PI * 2);
  } else {
    ctx.ellipse(p.x, p.y, p.rx || 3, p.ry || 2.5, 0, 0, Math.PI * 2);
  }
  ctx.fill();
}

function drawMouth(ctx, p, pal) {
  if (!p) return;
  ctx.strokeStyle = pal.mouth;
  ctx.lineWidth = p.lineWidth || 1.5;
  ctx.lineCap = 'round';

  if (p.style === 'smile') {
    // ^ 微笑
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, -Math.PI * 0.3, Math.PI * 0.3);
    ctx.stroke();
  } else if (p.style === 'open') {
    // 张嘴（好奇/惊讶）— 蓝舌
    ctx.fillStyle = night => night ? '#0d0d1a' : '#222';
    ctx.beginPath();
    ctx.ellipse(p.x, p.y + 1, p.rx || 5, p.ry || 4, 0, 0, Math.PI * 2);
    ctx.fill();
    // 蓝舌头
    ctx.fillStyle = pal.tongue;
    ctx.beginPath();
    ctx.ellipse(p.x, p.y + 1, (p.rx || 5) * 0.65, (p.ry || 4) * 0.7, 0, 0, Math.PI * 2);
    ctx.fill();
  } else if (p.style === 'yawn') {
    // 打哈欠大张嘴 — 蓝舌
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.ellipse(p.x, p.y + 2, 7, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    // 蓝舌头
    ctx.fillStyle = pal.tongue;
    ctx.beginPath();
    ctx.ellipse(p.x, p.y + 2, 5, 4.5, 0, 0, Math.PI * 2);
    ctx.fill();
  } else if (p.style === 'wShape') {
    // w 形嘴
    ctx.beginPath();
    ctx.moveTo(p.x - 5, p.y);
    ctx.quadraticCurveTo(p.x - 2, p.y + 3, p.x, p.y);
    ctx.moveTo(p.x, p.y);
    ctx.quadraticCurveTo(p.x + 2, p.y + 3, p.x + 5, p.y);
    ctx.stroke();
  } else {
    // 默认小直线
    ctx.beginPath();
    ctx.moveTo(p.x - 3, p.y);
    ctx.lineTo(p.x + 3, p.y);
    ctx.stroke();
  }
}

function drawWhiskers(ctx, p, pal) {
  if (!p || !p.show) return;
  ctx.strokeStyle = pal.whisker;
  ctx.lineWidth = 1;
  ctx.lineCap = 'round';

  const cx = p.x || 40;
  const cy = p.y || 34;

  // 左侧胡须
  ctx.beginPath();
  ctx.moveTo(cx - 12, cy);
  ctx.lineTo(cx - 26, cy - 4 + p.angle);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx - 12, cy + 2);
  ctx.lineTo(cx - 24, cy + 5 + p.angle);
  ctx.stroke();

  // 右侧胡须
  ctx.beginPath();
  ctx.moveTo(cx + 12, cy);
  ctx.lineTo(cx + 26, cy - 4 + p.angle);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx + 12, cy + 2);
  ctx.lineTo(cx + 24, cy + 5 + p.angle);
  ctx.stroke();
}

function drawEffects(ctx, p, pal) {
  if (!p) return;

  if (p.zzz) {
    // Zzz 气泡
    ctx.fillStyle = pal.zzz;
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('z', p.zzz.x, p.zzz.y);
    ctx.font = 'bold 10px sans-serif';
    ctx.fillText('Z', p.zzz.x + 8, p.zzz.y - 10);
    ctx.font = 'bold 8px sans-serif';
    ctx.fillText('Z', p.zzz.x + 14, p.zzz.y - 20);
  }

  if (p.heart) {
    // 爱心
    const h = p.heart;
    drawHeart(ctx, h.x, h.y, h.size || 5, pal.heart);
  }

  if (p.star) {
    // 星星
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(p.star.x, p.star.y, p.star.size || 2, 0, Math.PI * 2);
    ctx.fill();
  }

  if (p.sweat) {
    // 汗滴
    ctx.fillStyle = 'rgba(120,215,209,0.6)';
    ctx.beginPath();
    ctx.ellipse(p.sweat.x, p.sweat.y, 2.5, 4, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawHeart(ctx, x, y, size, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y + size * 0.3);
  ctx.bezierCurveTo(
    x - size * 0.5, y - size * 0.3,
    x - size, y + size * 0.3,
    x, y + size
  );
  ctx.bezierCurveTo(
    x + size, y + size * 0.3,
    x + size * 0.5, y - size * 0.3,
    x, y + size * 0.3
  );
  ctx.fill();
}

// ============================================================
//  姿势参数生成器 — 7 行 × 4 帧
// ============================================================

function getPoseParams(pose, frame, night) {
  // pose: 0=idle, 1=walk, 2=sleep, 3=happy, 4=curious, 5=startle, 6=daily
  // frame: 0-3

  switch (pose) {
    // ======== 0. 闲逛 Idle ========
    case 0: {
      const tailSway = Math.sin(frame * Math.PI / 2) * 3;
      const blink = frame === 1;

      return {
        tail: { x: 22, y: 54, style: 'up', sway: tailSway, angle: 0.2 },
        body: { x: 40, y: 56, rx: 18, ry: 16 },
        paws: [
          { x: 32, y: 68, rx: 6, ry: 4.5, showPad: true, padDx: 1, padDy: 2 },
          { x: 48, y: 68, rx: 6, ry: 4.5, showPad: true, padDx: -1, padDy: 2 },
        ],
        head: { x: 40, y: 34, r: 17 },
        ears: {
          left: { x: 28, y: 20, tipX: 24, tipY: 2, x2: 34, y2: 16, ix: 29, iy: 18, ix2: 33, iy2: 17 },
          right: { x: 52, y: 20, tipX: 56, tipY: 2, x2: 46, y2: 16, ix: 51, iy: 18, ix2: 47, iy2: 17 },
        },
        eyes: [
          { x: 34, y: 32, rx: 5.5, ry: 6.5, style: blink ? 'closed' : 'normal', night, glowBlur: night ? 12 : 3 },
          { x: 46, y: 32, rx: 5.5, ry: 6.5, style: blink ? 'closed' : 'normal', night, glowBlur: night ? 12 : 3 },
        ],
        nose: { x: 40, y: 38, rx: 2.5, ry: 2 },
        mouth: { x: 40, y: 41, style: 'wShape' },
        whiskers: { x: 40, y: 34, show: true, angle: 0 },
        effects: frame === 3 ? { heart: { x: 58, y: 16, size: 4 } } : {},
      };
    }

    // ======== 1. 走路 Walk ========
    case 1: {
      const walkPhase = frame / 4; // 0, 0.25, 0.5, 0.75
      const legPhase = Math.sin(walkPhase * Math.PI * 2);
      const bodyBob = Math.abs(Math.sin(walkPhase * Math.PI));

      return {
        tail: { x: 18, y: 48, style: 'drag', sway: legPhase * 2, angle: -0.15 },
        body: { x: 36, y: 52 + bodyBob * 1.5, rx: 19, ry: 14, style: 'walk', tilt: legPhase * 2 },
        paws: [
          { x: 30 + legPhase * 5, y: 66, rx: 5, ry: 4 },
          { x: 48 - legPhase * 5, y: 66, rx: 5, ry: 4 },
        ],
        head: { x: 40 + bodyBob * 1.5, y: 30 + bodyBob * 0.5, r: 16, style: bodyBob > 0.3 ? 'tiltLeft' : 'normal' },
        ears: {
          left: { x: 29, y: 16, tipX: 26, tipY: -1, x2: 34, y2: 13, ix: 30, iy: 14, ix2: 33, iy2: 13 },
          right: { x: 51, y: 16, tipX: 54, tipY: -1, x2: 46, y2: 13, ix: 50, iy: 14, ix2: 47, iy2: 13 },
        },
        eyes: [
          { x: 34, y: 28, rx: 5, ry: 6, style: 'normal', night, glowBlur: night ? 10 : 3 },
          { x: 46, y: 28, rx: 5, ry: 6, style: 'normal', night, glowBlur: night ? 10 : 3 },
        ],
        nose: { x: 40, y: 34, rx: 2.5, ry: 2 },
        mouth: { x: 40, y: 37, style: 'smile', lineWidth: 1.2 },
        whiskers: { x: 40, y: 30, show: true, angle: legPhase * 1.5 },
        effects: {},
      };
    }

    // ======== 2. 睡觉 Sleep ========
    case 2: {
      const breathe = Math.sin(frame * Math.PI / 2) * 1.5;

      return {
        tail: { x: 50, y: 56, style: 'circle', angle: 0.3 },
        body: { x: 40, y: 56, style: 'sleep' },
        paws: [
          { x: 28, y: 62 + breathe, rx: 7, ry: 5 },
          { x: 52, y: 62 + breathe, rx: 7, ry: 5 },
        ],
        head: { x: 40, y: 32 + breathe, r: 16, style: 'sleep' },
        ears: {
          left: { x: 29, y: 18, tipX: 27, tipY: 4, x2: 34, y2: 16, ix: 30, iy: 16, ix2: 33, iy2: 15 },
          right: { x: 51, y: 18, tipX: 53, tipY: 4, x2: 46, y2: 16, ix: 50, iy: 16, ix2: 47, iy2: 15 },
        },
        eyes: [
          { x: 35, y: 30, rx: 5, ry: 6, style: 'sleep', night, glowBlur: 0 },
          { x: 47, y: 30, rx: 5, ry: 6, style: 'sleep', night, glowBlur: 0 },
        ],
        nose: { x: 41, y: 36, rx: 2, ry: 1.8 },
        mouth: { x: 41, y: 39, style: 'line', lineWidth: 1 },
        whiskers: { x: 41, y: 32, show: false, angle: 0 },
        effects: {
          zzz: frame === 0 ? { x: 56, y: 18 } :
                frame === 1 ? { x: 58, y: 15 } :
                frame === 2 ? { x: 60, y: 12 } :
                { x: 56, y: 18 },
        },
      };
    }

    // ======== 3. 开心 Happy ========
    case 3: {
      const bounce = frame === 1 ? -3 : frame === 3 ? -2 : 0;

      return {
        tail: { x: 22, y: 50, style: 'curl', angle: 0.15 },
        body: { x: 40, y: 54 + bounce, rx: 18, ry: 16 },
        paws: [
          { x: 30, y: 66 + bounce, rx: 7, ry: 5 },
          { x: 50, y: 66 + bounce, rx: 7, ry: 5 },
        ],
        head: { x: 40, y: 32 + bounce, r: 17 },
        ears: {
          left: { x: 28, y: 18, tipX: 24, tipY: 0, x2: 34, y2: 14, ix: 29, iy: 16, ix2: 33, iy2: 15 },
          right: { x: 52, y: 18, tipX: 56, tipY: 0, x2: 46, y2: 14, ix: 51, iy: 16, ix2: 47, iy2: 15 },
        },
        eyes: [
          { x: 35, y: 30, rx: 5.5, ry: 5, style: frame === 2 ? 'closed' : 'happy', night, glowBlur: night ? 8 : 2 },
          { x: 47, y: 30, rx: 5.5, ry: 5, style: frame === 2 ? 'closed' : 'happy', night, glowBlur: night ? 8 : 2 },
        ],
        nose: { x: 41, y: 36, rx: 2.5, ry: 2 },
        mouth: { x: 41, y: 38, style: 'smile', lineWidth: 2 },
        whiskers: { x: 41, y: 32, show: true, angle: -2 },
        effects: frame === 3 ? { heart: { x: 62, y: 14, size: 6 } } :
                frame === 1 ? { heart: { x: 56, y: 22, size: 4 } } : {},
      };
    }

    // ======== 4. 好奇 Curious ========
    case 4: {
      const tilt = frame === 0 ? -2 : frame === 2 ? 2 : 0;
      const headTilt = frame === 0 ? 'tiltLeft' : frame === 2 ? 'tiltRight' : 'normal';

      return {
        tail: { x: 24, y: 50, style: 'up', sway: frame === 1 ? 3 : 0, angle: 0.35 },
        body: { x: 40, y: 54, rx: 18, ry: 16 },
        paws: [
          { x: 30, y: 66, rx: 6, ry: 5 },
          { x: 50, y: 66, rx: 6, ry: 5 },
        ],
        head: { x: 40 + tilt, y: 32, r: 17, style: headTilt },
        ears: {
          left: { x: 27, y: 17, tipX: 23, tipY: -2, x2: 33, y2: 13, ix: 28, iy: 15, ix2: 32, iy2: 14 },
          right: { x: 53, y: 17, tipX: 57, tipY: -2, x2: 47, y2: 13, ix: 52, iy: 15, ix2: 48, iy2: 14 },
        },
        eyes: [
          { x: 34, y: 30, rx: 6, ry: 7, style: frame === 3 ? 'surprised' : 'normal', night, glowBlur: night ? 14 : 4 },
          { x: 46, y: 30, rx: 6, ry: 7, style: frame === 3 ? 'surprised' : 'normal', night, glowBlur: night ? 14 : 4 },
        ],
        nose: { x: 40, y: 36, rx: 2.5, ry: 2, style: frame === 1 ? 'sniff' : 'normal' },
        mouth: { x: 40, y: 39, style: frame === 3 ? 'open' : 'wShape', rx: 4, ry: 3 },
        whiskers: { x: 40, y: 32, show: true, angle: tilt * 0.5 },
        effects: frame === 1 ? { star: { x: 28, y: 14, size: 3 } } :
                frame === 3 ? { star: { x: 54, y: 12, size: 3 } } : {},
      };
    }

    // ======== 5. 受惊 Startle ========
    case 5: {
      const jumpY = frame === 0 ? -10 : frame === 1 ? -5 : 0;
      const earFlat = frame < 2;

      return {
        tail: { x: 24, y: 50 + jumpY, style: 'up', sway: 8, angle: 0.6 },
        body: { x: 40, y: 56 + jumpY, rx: 18, ry: 16 },
        paws: [
          { x: 32, y: 68 + jumpY, rx: 6, ry: 5 },
          { x: 48, y: 68 + jumpY, rx: 6, ry: 5 },

        head: { x: 40, y: 32 + jumpY, r: 17, style: frame === 2 ? 'tiltLeft' : 'normal' },
        ears: earFlat ? {
          // 飞机耳
          left: { x: 30, y: 20, tipX: 22, tipY: 14, x2: 34, y2: 18, ix: 29, iy: 18, ix2: 32, iy2: 17 },
          right: { x: 50, y: 20, tipX: 58, tipY: 14, x2: 46, y2: 18, ix: 51, iy: 18, ix2: 48, iy2: 17 },
        } : {
          left: { x: 28, y: 18, tipX: 24, tipY: 1, x2: 34, y2: 14, ix: 29, iy: 16, ix2: 33, iy2: 15 },
          right: { x: 52, y: 18, tipX: 56, tipY: 1, x2: 46, y2: 14, ix: 51, iy: 16, ix2: 47, iy2: 15 },

        eyes: [

          { x: 46, y: 30 + jumpY, rx: 7, ry: 8, style: 'surprised', night, glowBlur: night ? 16 : 6 },

    // ======== 6. 日常 Daily ========
    case 6: {
      // 帧0=舔毛, 帧1=伸懒腰, 帧2=打哈欠, 帧3=歪头

          body: { x: 38, y: 50, rx: 20, ry: 14, style: 'stretch' },

            right: { x: 50, y: 17, tipX: 54, tipY: 0, x2: 44, y2: 13, ix: 49, iy: 15, ix2: 45, iy2: 14 },

          mouth: { x: 38, y: 39, style: 'line' },

            right: { x: 52, y: 18, tipX: 56, tipY: 0, x2: 46, y2: 14, ix: 51, iy: 16, ix2: 47, iy2: 15 },

          eyes: [

          ],
          nose: { x: 40, y: 36, rx: 2.5, ry: 2 },
          mouth: { x: 40, y: 38, style: 'yawn' },
          whiskers: { x: 40, y: 32, show: true, angle: 0 },
          effects: {},
        };
      } else {
        // 歪头杀
        return {
          tail: { x: 22, y: 52, style: 'up', sway: 2, angle: 0.25 },
          body: { x: 40, y: 56, rx: 18, ry: 16 },
          paws: [
            { x: 32, y: 68, rx: 6, ry: 5, showPad: true, padDx: 1, padDy: 2 },
            { x: 48, y: 68, rx: 6, ry: 5, showPad: true, padDx: -1, padDy: 2 },
          ],
          head: { x: 40, y: 33, r: 17, style: 'tiltRight' },
          ears: {
            left: { x: 28, y: 19, tipX: 24, tipY: 2, x2: 34, y2: 15, ix: 29, iy: 17, ix2: 33, iy2: 16 },
            right: { x: 52, y: 19, tipX: 56, tipY: 2, x2: 46, y2: 15, ix: 51, iy: 17, ix2: 47, iy2: 16 },
          },
          eyes: [
            { x: 34, y: 31, rx: 5.5, ry: 6.5, style: 'normal', night, glowBlur: night ? 10 : 3 },
            { x: 46, y: 31, rx: 5.5, ry: 6.5, style: 'normal', night, glowBlur: night ? 10 : 3 },
          ],
          nose: { x: 40, y: 37, rx: 2.5, ry: 2 },
          mouth: { x: 40, y: 40, style: 'smile', lineWidth: 2 },
          whiskers: { x: 40, y: 34, show: true, angle: 1 },
          effects: {},
        };
      }
    }

    default:
      return getPoseParams(0, frame, night);
  }
}

// ============================================================
//  渲染引擎
// ============================================================

function renderSheet() {
  sheetCtx.clearRect(0, 0, SHEET_W, SHEET_H);
  // 棋盘格背景
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = c * SPRITE_W, y = r * SPRITE_H;
      sheetCtx.fillStyle = (r + c) % 2 === 0 ? '#f0f0f0' : '#e4e4e4';
      sheetCtx.fillRect(x, y, SPRITE_W, SPRITE_H);
    }
  }

  // 绘制所有帧
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      sheetCtx.save();
      sheetCtx.translate(c * SPRITE_W, r * SPRITE_H);
      drawCat(sheetCtx, r, c, isNight);
      sheetCtx.restore();

      // 边框
      sheetCtx.strokeStyle = r === currentRow ? 'rgba(115,215,197,0.6)' : 'rgba(200,200,200,0.3)';
      sheetCtx.lineWidth = r === currentRow && c === currentFrame ? 2 : 0.5;
      sheetCtx.strokeRect(c * SPRITE_W, r * SPRITE_H, SPRITE_W, SPRITE_H);

      // 行标签（第一帧下方）
      if (c === 0) {
        sheetCtx.fillStyle = 'rgba(255,255,255,0.85)';
        sheetCtx.font = 'bold 9px sans-serif';
        sheetCtx.textAlign = 'left';
        sheetCtx.textBaseline = 'top';
        sheetCtx.fillText(ROW_NAMES[r], r * SPRITE_W + 2, r * SPRITE_H + 2);
      }
    }
  }

  // 当前选中帧高亮
  const hx = currentFrame * SPRITE_W;
  const hy = currentRow * SPRITE_H;
  sheetCtx.strokeStyle = '#73d7c5';
  sheetCtx.lineWidth = 2.5;
  sheetCtx.strokeRect(hx - 1, hy - 1, SPRITE_W + 2, SPRITE_H + 2);
}

function renderAnimPreview() {
  const scale = 3;
  animCtx.clearRect(0, 0, animCanvas.width, animCanvas.height);

  // 半透明棋盘
  for (let r = 0; r < 3; r++) {
    for (let c = 0; c < 3; c++) {
      animCtx.fillStyle = (r + c) % 2 === 0 ? 'rgba(240,240,240,0.4)' : 'rgba(228,228,228,0.4)';
      animCtx.fillRect(c * SPRITE_W, r * SPRITE_H, SPRITE_W, SPRITE_H);
    }
  }

  animCtx.save();
  animCtx.scale(scale, scale);
  drawCat(animCtx, currentRow, currentFrame, isNight);
  animCtx.restore();

  document.getElementById('rowNameTag').textContent = ROW_NAMES[currentRow];
}

function renderSinglePreview() {
  const scale = 3;
  singleCtx.clearRect(0, 0, singleCanvas.width, singleCanvas.height);

  for (let r = 0; r < 3; r++) {
    for (let c = 0; c < 3; c++) {
      singleCtx.fillStyle = (r + c) % 2 === 0 ? 'rgba(240,240,240,0.4)' : 'rgba(228,228,228,0.4)';
      singleCtx.fillRect(c * SPRITE_W, r * SPRITE_H, SPRITE_W, SPRITE_H);
    }
  }

  singleCtx.save();
  singleCtx.scale(scale, scale);
  drawCat(singleCtx, currentRow, currentFrame, isNight);
  singleCtx.restore();

  document.getElementById('frameNameTag').textContent = `帧 ${currentFrame + 1}/4`;
  document.getElementById('frameInfo').textContent = `${currentFrame + 1}/4`;
}

// ============================================================
//  动画循环
// ============================================================

function startAnim() {
  stopAnim();
  isPlaying = true;
  document.getElementById('animBtn').textContent = '暂停';
  document.getElementById('animBtn').classList.add('active');
  tick();
}

function stopAnim() {
  isPlaying = false;
  if (animTimer) {
    clearTimeout(animTimer);
    animTimer = null;
  }
  document.getElementById('animBtn').textContent = '播放';
  document.getElementById('animBtn').classList.remove('active');
}

function tick() {
  if (!isPlaying) return;
  currentFrame = (currentFrame + 1) % COLS;
  renderAll();
  animTimer = setTimeout(tick, 1000 / fps);
}

function renderAll() {
  renderSheet();
  renderAnimPreview();
  renderSinglePreview();
}

// ============================================================
//  UI 事件绑定
// ============================================================

// 播放/暂停
document.getElementById('animBtn').addEventListener('click', () => {
  if (isPlaying) stopAnim(); else startAnim();
});

// 速度滑块
document.getElementById('speedRange').addEventListener('input', (e) => {
  fps = parseInt(e.target.value);
  document.getElementById('speedLabel').textContent = `${fps} fps`;
  if (isPlaying) { stopAnim(); startAnim(); }
});

// 行选择
document.getElementById('rowSelect').addEventListener('change', (e) => {
  currentRow = parseInt(e.target.value);
  currentFrame = 0;
  renderAll();
});

// 夜间模式切换
document.getElementById('themeBtn').addEventListener('click', () => {
  isNight = !isNight;
  document.getElementById('themeBtn').textContent = isNight ? '☀ 日间' : '☾ 夜间';
  document.documentElement.toggleAttribute('data-theme', isNight);
  renderAll();
});

// 导出 PNG
document.getElementById('exportBtn').addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = `cat-spritesheet-${isNight ? 'night' : 'day'}.png`;
  link.href = sheetCanvas.toDataURL('image/png');
  link.click();
});

// 键盘快捷键
document.addEventListener('keydown', (e) => {
  if (e.key === ' ') { e.preventDefault(); document.getElementById('animBtn').click(); }
  if (e.key === 'ArrowRight') {
    e.preventDefault();
    currentFrame = (currentFrame + 1) % COLS;
    renderAll();
  }
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    currentFrame = (currentFrame - 1 + COLS) % COLS;
    renderAll();
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    currentRow = (currentRow - 1 + ROWS) % ROWS;
    document.getElementById('rowSelect').value = currentRow;
    currentFrame = 0;
    renderAll();
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    currentRow = (currentRow + 1) % ROWS;
    document.getElementById('rowSelect').value = currentRow;
    currentFrame = 0;
    renderAll();
  }
});

// ============================================================
//  初始化
// ============================================================

renderAll();
startAnim();
</script>
</body>
</html>
